<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.10/hls.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    video { width: 100vw; height: 100vh; display: block; object-fit: contain; background: #000; }
  </style>
</head>
<body>
  <video id="video" controls playsinline></video>
  <script>
    const src = "https://vsd217.okcdn.ru/cmaf/14569670183679/sig/7WI8l-RDCGI/expires/1776087889827/srcIp/47.31.83.14/urls/45.136.22.40/clientType/36/srcAg/CHROME/mid/13635606300671/get/hls_13635606300671.PT-HO5LNHIU.m3u8";
    const video = document.getElementById('video');

    if (Hls.isSupported()) {
      const hls = new Hls({ lowLatencyMode: true });
      hls.loadSource(src);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = src;
      video.play().catch(() => {});
    }
  </script>
</body>
</html>
